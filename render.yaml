services:
  - type: web
    name: multixy-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard — never commit this value
      - key: FRONTEND_ORIGIN
        sync: false          # set to your Vercel URL after deploying frontend
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
